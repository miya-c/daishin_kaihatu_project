
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWA Icons - 水道検針アプリ</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .icon-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; }
    .icon-item { text-align: center; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
    .icon-item img { max-width: 100%; height: auto; }
    .icon-item h3 { margin: 10px 0; font-size: 14px; }
  </style>
</head>
<body>
  <h1>PWA Icons - 水道検針アプリ</h1>
  <div class="icon-grid">
    
      <div class="icon-item">
        <img src="icon-72x72.svg" alt="72x72 icon">
        <h3>icon-72x72.svg</h3>
      </div>
    
      <div class="icon-item">
        <img src="icon-96x96.svg" alt="96x96 icon">
        <h3>icon-96x96.svg</h3>
      </div>
    
      <div class="icon-item">
        <img src="icon-128x128.svg" alt="128x128 icon">
        <h3>icon-128x128.svg</h3>
      </div>
    
      <div class="icon-item">
        <img src="icon-144x144.svg" alt="144x144 icon">
        <h3>icon-144x144.svg</h3>
      </div>
    
      <div class="icon-item">
        <img src="icon-152x152.svg" alt="152x152 icon">
        <h3>icon-152x152.svg</h3>
      </div>
    
      <div class="icon-item">
        <img src="icon-192x192.svg" alt="192x192 icon">
        <h3>icon-192x192.svg</h3>
      </div>
    
      <div class="icon-item">
        <img src="icon-384x384.svg" alt="384x384 icon">
        <h3>icon-384x384.svg</h3>
      </div>
    
      <div class="icon-item">
        <img src="icon-512x512.svg" alt="512x512 icon">
        <h3>icon-512x512.svg</h3>
      </div>
    
    
      <div class="icon-item">
        <img src="icon-192x192-maskable.svg" alt="192x192 maskable icon">
        <h3>icon-192x192-maskable.svg</h3>
      </div>
    
      <div class="icon-item">
        <img src="icon-512x512-maskable.svg" alt="512x512 maskable icon">
        <h3>icon-512x512-maskable.svg</h3>
      </div>
    
    <div class="icon-item">
      <img src="splash-screen.svg" alt="Splash screen" style="max-height: 200px;">
      <h3>splash-screen.svg</h3>
    </div>
  </div>
</body>
</html>
