<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5" />
      <stop offset="50%" stop-color="#1E88E5" />
      <stop offset="100%" stop-color="#1565C0" />
    </linearGradient>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#E3F2FD" />
    </linearGradient>
    <linearGradient id="needleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB74D" />
      <stop offset="100%" stop-color="#F57C00" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0D47A1" flood-opacity="0.3" />
    </filter>
    <radialGradient id="gloss" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="108" fill="url(#bgGrad)" />

  <!-- Water ripple rings -->
  <circle cx="256" cy="350" r="160" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5" />
  <circle cx="256" cy="350" r="200" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1.5" />
  <circle cx="256" cy="350" r="240" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1.5" />

  <!-- Water Drop -->
  <g filter="url(#dropShadow)">
    <path d="M 256 88 C 256 88, 178 210, 178 290 C 178 340, 213 382, 256 382 C 299 382, 334 340, 334 290 C 334 210, 256 88, 256 88 Z" fill="url(#dropGrad)" opacity="0.95" />
  </g>

  <!-- Gauge circle outline -->
  <circle cx="256" cy="290" r="68" fill="none" stroke="#90CAF9" stroke-width="3" opacity="0.5" />

  <!-- Gauge tick marks -->
  <g stroke="#1976D2" stroke-width="2.5" stroke-linecap="round" opacity="0.6">
    <line x1="204" y1="342" x2="212" y2="334" />
    <line x1="190" y1="316" x2="200" y2="312" />
    <line x1="188" y1="290" x2="198" y2="290" />
    <line x1="226" y1="360" x2="230" y2="350" />
    <line x1="208" y1="264" x2="198" y2="260" />
    <line x1="308" y1="342" x2="300" y2="334" />
    <line x1="322" y1="316" x2="312" y2="312" />
    <line x1="324" y1="290" x2="314" y2="290" />
    <line x1="286" y1="360" x2="282" y2="350" />
    <line x1="204" y1="240" x2="196" y2="246" />
    <line x1="308" y1="240" x2="316" y2="246" />
    <line x1="324" y1="264" x2="314" y2="260" />
  </g>

  <!-- Gauge arc -->
  <path d="M 188 290 A 68 68 0 0 1 324 290" fill="none" stroke="#1565C0" stroke-width="3.5" stroke-linecap="round" opacity="0.4" />

  <!-- Needle pointing to ~45° -->
  <line x1="256" y1="290" x2="308" y2="244" stroke="url(#needleGrad)" stroke-width="5" stroke-linecap="round" />

  <!-- Center dot -->
  <circle cx="256" cy="290" r="8" fill="#F57C00" />
  <circle cx="256" cy="290" r="4.5" fill="#FFE0B2" />

  <!-- Gloss overlay -->
  <path d="M 256 88 C 256 88, 178 210, 178 290 C 178 340, 213 382, 256 382 C 299 382, 334 340, 334 290 C 334 210, 256 88, 256 88 Z" fill="url(#gloss)" opacity="0.6" />

  <!-- Tiny highlight on drop top -->
  <ellipse cx="240" cy="170" rx="20" ry="30" fill="#ffffff" opacity="0.25" transform="rotate(-15, 240, 170)" />
</svg>
