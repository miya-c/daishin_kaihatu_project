<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <base target="_top" />
    <title>水道検針 管理画面</title>
    <!-- TrustedTypes shim: GAS enforces Trusted Types CSP which blocks inline scripts -->
    <script>
      if (window.trustedTypes && window.trustedTypes.createPolicy) {
        window.trustedTypes.createPolicy('default', {
          createHTML: function (string) {
            return string;
          },
          createScriptURL: function (string) {
            return string;
          },
          createScript: function (string) {
            return string;
          },
        });
      }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1/css/bulma.min.css" />
    <style>
      /* ── Design System: Bulma lightness variables ── */

      /* ── Light Mode (Bulma lightness variables) ── */
      [data-theme='light'],
      :root {
        --bulma-scheme-h: 220;
        --bulma-scheme-s: 14%;
        --bulma-scheme-main-l: 97%;
        --bulma-scheme-main-bis-l: 98%;
        --bulma-scheme-main-ter-l: 96%;
        --bulma-scheme-invert-l: 8%;
        --bulma-scheme-invert-bis-l: 12%;
        --bulma-scheme-invert-ter-l: 20%;
        --bulma-background-l: 96%;
        --bulma-border-l: 90%;
        --bulma-border-weak-l: 93%;
        --bulma-text-l: 12%;
        --bulma-text-weak-l: 42%;
        --bulma-text-strong-l: 12%;
        --bulma-text-title-l: 12%;
        --bulma-soft-l: 90%;
        --bulma-bold-l: 20%;
        --bulma-soft-invert-l: 20%;
        --bulma-bold-invert-l: 90%;
        --bulma-primary-h: 217;
        --bulma-primary-s: 91%;
        --bulma-primary-l: 60%;
        --bulma-primary-invert-l: 100%;
        --bulma-link-h: 217;
        --bulma-link-s: 91%;
        --bulma-link-l: 60%;
        --bulma-link-invert-l: 100%;
        --bulma-box-background-color: #ffffff;
        --bulma-box-radius: 8px;
      }

      /* ── Dark Mode (Bulma lightness variables) ── */
      [data-theme='dark'] {
        --bulma-scheme-main-l: 2%;
        --bulma-scheme-main-bis-l: 7%;
        --bulma-scheme-main-ter-l: 8%;
        --bulma-scheme-invert-l: 98%;
        --bulma-scheme-invert-bis-l: 94%;
        --bulma-scheme-invert-ter-l: 88%;
        --bulma-background-l: 5%;
        --bulma-border-l: 15%;
        --bulma-border-weak-l: 15%;
        --bulma-text-l: 98%;
        --bulma-text-weak-l: 64%;
        --bulma-text-strong-l: 98%;
        --bulma-text-title-l: 98%;
        --bulma-soft-l: 12%;
        --bulma-bold-l: 90%;
        --bulma-soft-invert-l: 90%;
        --bulma-bold-invert-l: 12%;
        --bulma-primary-invert-l: 100%;
        --bulma-link-invert-l: 100%;
      }

      /* ── Layout ── */
      .sidebar {
        min-height: 100vh;
        background: var(--bulma-box-background-color);
        padding: 1rem;
        border-right: 1px solid var(--bulma-border);
        transition: transform 0.3s ease;
      }
      .sidebar-menu {
        padding-top: 1rem;
      }
      .sidebar-menu .menu-label {
        font-size: 0.75rem;
        letter-spacing: 0.05em;
      }
      .sidebar-menu .menu-list a {
        padding: 0.5em 0.75em;
        border-radius: 6px;
      }
      .sidebar-menu .menu-list a.is-active {
        background: var(--bulma-primary);
        color: var(--bulma-primary-invert);
      }
      .sidebar-menu .menu-list a:hover {
        background: var(--bulma-scheme-main);
      }
      .main-content {
        padding: 2rem;
      }
      body {
        background-color: var(--bulma-scheme-main);
        color: var(--bulma-text);
      }
      .admin-header {
        background: var(--bulma-primary);
        color: var(--bulma-primary-invert);
        padding: 0.75rem 1.5rem;
      }
      .admin-header .navbar-item {
        color: var(--bulma-primary-invert);
      }
      .box {
        border: 1px solid var(--bulma-border);
      }
      .input {
        border-color: var(--bulma-border);
      }
      .input:focus {
        border-color: var(--bulma-primary);
      }

      /* ── Theme Toggle ── */
      .theme-toggle-btn {
        background: transparent;
        border: 1px solid var(--bulma-border);
        border-radius: 6px;
        padding: 0.3rem 0.6rem;
        cursor: pointer;
        font-size: 1.1rem;
        line-height: 1;
        color: var(--bulma-text);
        transition:
          background 0.2s,
          border-color 0.2s;
      }
      .theme-toggle-btn:hover {
        background: var(--bulma-scheme-main-bis);
      }

      /* ── Toast Notifications ── */
      .toast-container {
        position: fixed;
        top: 1rem;
        right: 1rem;
        z-index: 9999;
        max-width: 400px;
      }
      .toast-item {
        padding: 0.75rem 1rem;
        border-radius: 6px;
        margin-bottom: 0.5rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        display: flex;
        justify-content: space-between;
        align-items: center;
        animation: toast-in 0.3s ease-out;
      }
      .toast-item.is-success {
        background: #f0fdf4;
        color: #166534;
        border: 1px solid #bbf7d0;
      }
      .toast-item.is-warning {
        background: #fefce8;
        color: #854d0e;
        border: 1px solid #fef08a;
      }
      .toast-item.is-error {
        background: #fef2f2;
        color: #991b1b;
        border: 1px solid #fecaca;
      }
      .toast-item.is-info {
        background: #eff6ff;
        color: #1e40af;
        border: 1px solid #bfdbfe;
      }
      [data-theme='dark'] .toast-item.is-success {
        background: #052e16;
        color: #86efac;
        border-color: #166534;
      }
      [data-theme='dark'] .toast-item.is-warning {
        background: #422006;
        color: #fde047;
        border-color: #854d0e;
      }
      [data-theme='dark'] .toast-item.is-error {
        background: #450a0a;
        color: #fca5a5;
        border-color: #991b1b;
      }
      [data-theme='dark'] .toast-item.is-info {
        background: #172554;
        color: #93c5fd;
        border-color: #1e40af;
      }
      .toast-dismiss {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1.1rem;
        margin-left: 0.75rem;
        opacity: 0.6;
        padding: 0;
        line-height: 1;
      }
      .toast-dismiss:hover {
        opacity: 1;
      }
      @keyframes toast-in {
        from {
          opacity: 0;
          transform: translateX(100%);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* ── Mobile Responsive ── */
      @media (max-width: 768px) {
        .sidebar {
          position: fixed;
          top: 0;
          left: 0;
          bottom: 0;
          width: 260px;
          z-index: 100;
          transform: translateX(-100%);
        }
        .sidebar.is-open {
          transform: translateX(0);
        }
        .sidebar-overlay {
          display: none;
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: rgba(0, 0, 0, 0.4);
          z-index: 99;
        }
        .sidebar-overlay.is-active {
          display: block;
        }
        .sidebar-header-desktop {
          display: none;
        }
        .hamburger-btn {
          display: inline-flex;
        }
      }
      @media (min-width: 769px) {
        .hamburger-btn {
          display: none;
        }
        .sidebar-overlay {
          display: none !important;
        }
      }
    </style>

  </head>
  <body>
    <div x-data>
      <!-- Auth Gate -->
      <template x-if="!$store.auth.authenticated">
        <section class="hero is-fullheight" style="position: relative">
          <div style="position: absolute; top: 1rem; right: 1rem">
            <button
              class="theme-toggle-btn"
              aria-label="テーマ切替"
              x-on:click="$store.theme.toggle()"
              x-text="$store.theme.dark ? '☀️' : '🌙'"
            ></button>
          </div>
          <div class="hero-body">
            <div class="container has-text-centered" style="max-width: 400px">
              <div class="box">
                <h1 class="title is-4">水道検針 管理画面</h1>
                <p class="subtitle is-6 has-text-grey">管理パスワードを入力してください</p>

                <div x-data="authGate">
                  <div class="field">
                    <div class="control">
                      <input
                        class="input"
                        type="password"
                        placeholder="管理パスワード"
                        required
                        x-model="token"
                        x-on:keydown.enter="submit"
                        x-bind:disabled="loading"
                      />
                    </div>
                  </div>

                  <div
                    x-show="error"
                    x-text="error"
                    class="notification is-danger is-light mb-3"
                    style="font-size: 0.85rem"
                  ></div>

                  <button
                    class="button is-primary is-fullwidth"
                    x-bind:class="{ 'is-loading': loading }"
                    x-on:click="submit"
                    x-text="loading ? '認証中...' : 'ログイン'"
                  ></button>

                  <template x-if="!window.google">
                    <p class="mt-4 is-size-7 has-text-grey">
                      ※ ローカル開発時は「test-token」を入力
                    </p>
                  </template>
                </div>
              </div>
            </div>
          </div>
        </section>
      </template>

      <!-- Main Admin UI -->
      <template x-if="$store.auth.authenticated">
        <div x-data="adminApp">
          <div
            class="sidebar-overlay"
            x-bind:class="{ 'is-active': sidebarOpen }"
            x-on:click="closeSidebar"
          ></div>
          <div class="columns is-gapless">
            <!-- Sidebar -->
            <div class="column is-2 sidebar" x-bind:class="{ 'is-open': sidebarOpen }">
              <div class="admin-header mb-4 sidebar-header-desktop">
                <strong class="has-text-white">🚰 水道検針 管理</strong>
              </div>

              <nav class="menu sidebar-menu" aria-label="管理メニュー">
                <p class="menu-label">メニュー</p>
                <ul class="menu-list">
                  <template x-for="tab in tabs" :key="tab.id">
                    <li>
                      <a
                        x-bind:class="{ 'is-active': activeTab === tab.id }"
                        x-bind:aria-current="activeTab === tab.id ? 'page' : null"
                        x-on:click="switchTab(tab.id)"
                        x-text="tab.icon + ' ' + tab.label"
                      ></a>
                    </li>
                  </template>
                </ul>
              </nav>

              <div class="mt-6">
                <button class="button is-small is-light" x-on:click="logout">ログアウト</button>
              </div>
            </div>

            <!-- Content Area -->
            <div class="column">
              <div
                class="admin-header is-flex is-justify-content-space-between is-align-items-center"
              >
                <div class="is-flex is-align-items-center">
                  <button
                    class="hamburger-btn button is-small is-ghost has-text-white mr-2"
                    x-on:click="toggleSidebar"
                  >
                    ☰
                  </button>
                  <strong class="has-text-white">🚰 水道検針 管理</strong>
                  <span
                    class="has-text-white"
                    style="opacity: 0.7"
                    x-text="'/ ' + activeTabLabel"
                  ></span>
                </div>
                <button
                  class="theme-toggle-btn"
                  aria-label="テーマ切替"
                  x-on:click="$store.theme.toggle()"
                  x-text="$store.theme.dark ? '☀️' : '🌙'"
                ></button>
              </div>
              <div class="main-content">
                <!-- Dashboard -->
                <div x-show="activeTab === 'dashboard'" x-data="dashboard">
                  <div x-show="loading" class="has-text-centered py-6">
                    <button class="button is-loading is-large is-static"></button>
                    <p class="mt-3 has-text-grey">読み込み中...</p>
                  </div>
                  <div x-show="!loading && error" class="notification is-danger">
                    <p x-text="error"></p>
                    <button class="button is-small mt-2" x-on:click="refresh()">再試行</button>
                  </div>
                  <div x-show="!loading && data">
                    <div
                      class="is-flex is-justify-content-space-between is-align-items-center mb-3"
                    >
                      <p class="heading mb-0">ダッシュボード</p>
                      <button class="button is-small is-light" x-on:click="refresh()">
                        🔄 更新
                      </button>
                    </div>
                    <div class="columns is-multiline">
                      <div class="column is-3">
                        <div class="box has-text-centered">
                          <p class="heading">物件数</p>
                          <p
                            class="title has-text-primary"
                            x-text="data ? data.propertyCount : 0"
                          ></p>
                        </div>
                      </div>
                      <div class="column is-3">
                        <div class="box has-text-centered">
                          <p class="heading">総部屋数</p>
                          <p class="title" x-text="data ? data.totalRooms : 0"></p>
                        </div>
                      </div>
                      <div class="column is-3">
                        <div class="box has-text-centered">
                          <p class="heading">検針済み</p>
                          <p
                            class="title has-text-success"
                            x-text="data ? data.completedRooms : 0"
                          ></p>
                        </div>
                      </div>
                      <div class="column is-3">
                        <div class="box has-text-centered">
                          <p class="heading">完了率</p>
                          <p
                            class="title"
                            x-bind:class="completionColor()"
                            x-text="data ? data.completionRate + '%' : '0%'"
                          ></p>
                        </div>
                        <div
                          x-show="properties && properties.length === 0 && !loading"
                          class="has-text-centered py-4"
                        >
                          <p class="has-text-grey">
                            物件が登録されていません。初期設定ウィザードを実行してください。
                          </p>
                        </div>
                      </div>
                    </div>
                    <div x-show="data && data.spreadsheetInfo" class="box mb-4">
                      <p class="heading">スプレッドシート</p>
                      <p
                        x-show="data && data.spreadsheetInfo"
                        x-text="data && data.spreadsheetInfo ? data.spreadsheetInfo.name : ''"
                      ></p>
                      <a
                        x-show="data && data.spreadsheetInfo && data.spreadsheetInfo.url"
                        x-bind:href="data && data.spreadsheetInfo ? data.spreadsheetInfo.url : '#'"
                        target="_blank"
                        class="is-size-7"
                        >シートを開く</a
                      >
                    </div>
                    <div x-show="properties && properties.length > 0">
                      <p class="heading mb-3">物件一覧</p>
                      <table class="table is-fullwidth is-hoverable">
                        <thead>
                          <tr>
                            <th>物件名</th>
                            <th>部屋数</th>
                            <th>検針済み</th>
                            <th>状態</th>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="prop in properties" :key="prop.id || prop.propertyId">
                            <tr>
                              <td x-text="prop.name || prop.propertyName"></td>
                              <td x-text="prop.roomCount || '-'"></td>
                              <td x-text="prop.completedCount || 0"></td>
                              <td>
                                <span
                                  class="tag"
                                  x-bind:class="prop.completedCount > 0 ? 'is-success' : 'is-light'"
                                  x-text="prop.completedCount > 0 ? '検針中' : '未着手'"
                                ></span>
                              </td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

                <!-- Monthly Process -->
                <div x-show="activeTab === 'monthly'" x-data="monthlyProcess">
                  <div class="box">
                    <div x-show="step === 'idle'">
                      <p class="title is-4">📅 月次処理</p>
                      <p class="mb-4">
                        先月までの検針データを保存し、今月分の新しいデータを準備します。実行前に確認を行ってください。
                      </p>
                      <button class="button is-primary" x-on:click="runPreCheck()">
                        実行前に確認する
                      </button>
                    </div>

                    <div x-show="step === 'checking'" class="has-text-centered py-5">
                      <button class="button is-loading is-large is-static"></button>
                      <p class="mt-3 has-text-grey">確認中...</p>
                    </div>

                    <div x-show="step === 'confirm'">
                      <p class="title is-4">📋 確認結果</p>
                      <div class="mb-4">
                        <template x-for="(check, i) in checkResults.checks || []" :key="i">
                          <div
                            class="notification mb-2"
                            x-bind:class="getCategoryClass(check.type)"
                          >
                            <span x-text="getCategoryIcon(check.type)"></span>
                            <strong x-text="check.category"></strong>
                            <span
                              class="is-size-7"
                              x-text="'（' + getCategoryLabel(check.type) + '）'"
                            ></span>
                            <p class="is-size-7 mt-1" x-text="check.message"></p>
                          </div>
                        </template>
                      </div>
                      <div x-show="errorCount > 0" class="notification is-danger mb-3">
                        <strong
                          x-text="errorCount + '件のエラーが見つかりました。エラーを修正してからやり直してください。'"
                        ></strong>
                      </div>
                      <div
                        x-show="warningCount > 0 && errorCount === 0"
                        class="notification is-warning mb-3"
                      >
                        <strong
                          x-text="warningCount + '件の注意事項があります。このまま進めますか？'"
                        ></strong>
                      </div>
                      <div class="field is-grouped">
                        <button
                          class="button is-primary"
                          x-bind:disabled="!canExecute"
                          x-on:click="runExecute()"
                        >
                          月次処理を実行
                        </button>
                        <button class="button is-light" x-on:click="reset()">戻る</button>
                      </div>
                    </div>

                    <div x-show="step === 'executing'" class="has-text-centered py-5">
                      <button class="button is-loading is-large is-static"></button>
                      <p class="mt-3 has-text-grey">
                        月次処理実行中...（30-60秒かかる場合があります）
                      </p>
                    </div>

                    <div x-show="step === 'done'">
                      <p class="title is-4">✅ 月次処理完了</p>
                      <div class="notification is-success is-light">
                        <p
                          x-text="executeResult && executeResult.summary ? executeResult.summary.message : '月次処理が完了しました。先月のデータは保存されています。'"
                        ></p>
                      </div>
                      <div x-show="executeResult" class="content is-size-7">
                        <p
                          x-text="executeResult ? '実行時刻: ' + (executeResult.executedAt || '') : ''"
                        ></p>
                        <p
                          x-text="executeResult ? '所要時間: ' + (executeResult.duration || '') : ''"
                        ></p>
                      </div>
                      <button class="button is-light" x-on:click="reset()">戻る</button>
                    </div>

                    <div x-show="step === 'error'" class="notification is-danger">
                      <p x-text="error"></p>
                      <button class="button is-small mt-2" x-on:click="reset()">再試行</button>
                    </div>
                  </div>
                </div>

                <!-- Setup Wizard -->
                <div x-show="activeTab === 'setup'" x-data="setupWizard">
                  <div class="box">
                    <p class="title is-4">⚙️ 初期設定ウィザード</p>
                    <p class="mb-4 has-text-grey is-size-6">
                      初めてご利用の場合は、以下の手順に沿って初期設定を行ってください。各ステップの「実行」ボタンを押すと自動的に処理が進みます。
                    </p>
                    <div class="steps mb-4">
                      <template x-for="(step, i) in steps" :key="step.id">
                        <div
                          class="steps-segment"
                          x-bind:class="{ 'is-active': currentStep === i, 'is-completed': getStepResult(step.id) && getStepResult(step.id).success }"
                        >
                          <span
                            x-text="getStatusIcon(getStepStatus(step.id)) + ' ' + (i + 1) + '. ' + step.label"
                          ></span>
                        </div>
                      </template>
                    </div>
                    <div x-show="steps[currentStep]" class="mb-4">
                      <p
                        class="title is-5"
                        x-text="steps[currentStep] ? steps[currentStep].icon + ' ' + steps[currentStep].label : ''"
                      ></p>
                      <p
                        class="mb-3 has-text-grey is-size-6"
                        x-text="steps[currentStep] ? steps[currentStep].description : ''"
                      ></p>
                      <button
                        class="button is-primary"
                        x-bind:class="{ 'is-loading': loading }"
                        x-bind:disabled="loading"
                        x-on:click="executeCurrentStep()"
                      >
                        このステップを実行
                      </button>
                    </div>
                    <div
                      x-show="getStepResult(steps[currentStep] ? steps[currentStep].id : '')"
                      class="notification"
                      x-bind:class="getStepResult(steps[currentStep] ? steps[currentStep].id : '') && getStepResult(steps[currentStep] ? steps[currentStep].id : '').success ? 'is-success is-light' : 'is-danger is-light'"
                    >
                      <p
                        x-text="formatStepResult(steps[currentStep] ? steps[currentStep].id : '')"
                      ></p>
                    </div>
                    <div x-show="error" class="notification is-danger">
                      <p x-text="error"></p>
                    </div>
                    <div class="field is-grouped mt-4">
                      <button
                        class="button"
                        x-bind:disabled="isFirstStep()"
                        x-on:click="prevStep()"
                      >
                        前へ
                      </button>
                      <button
                        class="button is-primary"
                        x-bind:disabled="isLastStep()"
                        x-on:click="nextStep()"
                      >
                        次へ
                      </button>
                      <button class="button is-light" x-on:click="reset()">リセット</button>
                    </div>
                  </div>
                </div>

                <!-- Data Maintenance -->
                <div x-show="activeTab === 'maintenance'" x-data="dataMaintenance">
                  <p class="title is-4">🔧 データ管理</p>
                  <div class="columns is-multiline">
                    <template x-for="tool in tools" :key="tool.id">
                      <div class="column is-6">
                        <div class="box">
                          <p class="title is-5" x-text="tool.icon + ' ' + tool.label"></p>
                          <p class="subtitle is-6 has-text-grey" x-text="tool.description"></p>
                          <div x-show="!tool.result && !tool.confirmPending && !tool.loading">
                            <button
                              class="button"
                              x-bind:class="tool.destructive ? 'is-warning' : 'is-info'"
                              x-on:click="executeTool(tool.id)"
                            >
                              実行
                            </button>
                          </div>
                          <div
                            x-show="tool.confirmPending"
                            class="notification is-warning is-light"
                          >
                            <p
                              x-text="tool.label + 'を実行します。この操作は取り消せません。よろしいですか？'"
                            ></p>
                            <div class="field is-grouped mt-2">
                              <button class="button is-danger" x-on:click="confirmTool(tool.id)">
                                実行する
                              </button>
                              <button class="button is-light" x-on:click="cancelTool(tool.id)">
                                キャンセル
                              </button>
                            </div>
                            <div
                              x-show="data && (!data.issues || data.issues.length === 0)"
                              class="has-text-centered py-3"
                            >
                              <p class="has-text-success">✅ 問題は見つかりませんでした</p>
                            </div>
                          </div>
                          <div x-show="tool.loading" class="has-text-centered">
                            <button class="button is-loading is-static"></button>
                            <p class="is-size-7 mt-2 has-text-grey">処理中...</p>
                          </div>
                          <div x-show="tool.result" class="notification is-success is-light">
                            <p
                              x-text="typeof tool.result === 'string' ? tool.result : tool.result.message || '完了しました。'"
                            ></p>
                            <button class="button is-small mt-2" x-on:click="resetTool(tool.id)">
                              再実行
                            </button>
                          </div>
                          <div x-show="tool.error" class="notification is-danger is-light">
                            <p x-text="tool.error"></p>
                            <button class="button is-small mt-2" x-on:click="resetTool(tool.id)">
                              再試行
                            </button>
                          </div>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>

                <!-- Diagnostics -->
                <div x-show="activeTab === 'diagnostics'" x-data="diagnostics">
                  <div class="box">
                    <div
                      class="is-flex is-justify-content-space-between is-align-items-center mb-4"
                    >
                      <p class="title is-4 mb-0">🔍 動作確認</p>
                      <button
                        class="button is-info"
                        x-bind:class="{ 'is-loading': loading }"
                        x-bind:disabled="loading"
                        x-on:click="runDiagnostics()"
                      >
                        確認を実行
                      </button>
                    </div>
                    <div x-show="!data && !loading && !error">
                      <p class="has-text-grey has-text-centered py-6">
                        「確認を実行」ボタンを押してください
                      </p>
                    </div>
                    <div x-show="loading" class="has-text-centered py-5">
                      <button class="button is-loading is-large is-static"></button>
                      <p class="mt-3 has-text-grey">確認中...</p>
                    </div>
                    <div x-show="error" class="notification is-danger">
                      <p x-text="error"></p>
                    </div>
                    <div x-show="data">
                      <div class="mb-4">
                        <span
                          class="tag is-large"
                          x-bind:class="getStatusClass(getOverallStatus())"
                          x-text="getStatusLabel(getOverallStatus())"
                        ></span>
                        <span
                          class="is-size-7 ml-2"
                          x-text="data ? '実行時刻: ' + (data.timestamp || '') : ''"
                        ></span>
                      </div>
                      <div x-show="data && data.sheets && data.sheets.length > 0" class="mb-4">
                        <p class="heading">データ状態</p>
                        <table class="table is-fullwidth is-hoverable">
                          <thead>
                            <tr>
                              <th>シート名</th>
                              <th>状態</th>
                              <th>行数</th>
                            </tr>
                          </thead>
                          <tbody>
                            <template
                              x-for="(sheet, i) in (data && data.sheets ? data.sheets : [])"
                              :key="i"
                            >
                              <tr>
                                <td x-text="sheet.name"></td>
                                <td>
                                  <span
                                    class="tag"
                                    x-bind:class="sheet.healthy ? 'is-success' : 'is-danger'"
                                    x-text="sheet.healthy ? '正常' : '異常'"
                                  ></span>
                                </td>
                                <td x-text="sheet.rowCount || sheet.rows || '-'"></td>
                              </tr>
                            </template>
                          </tbody>
                        </table>
                      </div>
                      <div x-show="data && data.issues && data.issues.length > 0">
                        <p class="heading">問題一覧</p>
                        <template
                          x-for="(issue, i) in (data && data.issues ? data.issues : [])"
                          :key="i"
                        >
                          <div
                            class="notification mb-2"
                            x-bind:class="issue.severity === 'error' ? 'is-danger is-light' : issue.severity === 'warning' ? 'is-warning is-light' : 'is-info is-light'"
                          >
                            <span
                              x-text="getSeverityIcon(issue.severity) + ' ' + issue.message"
                            ></span>
                          </div>
                        </template>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </template>

      <!-- Global Toast -->
      <div class="toast-container" x-data>
        <template x-for="item in $store.toast.items" :key="item.id">
          <div class="toast-item" x-bind:class="'is-' + item.type">
            <span x-text="item.message"></span>
            <button class="toast-dismiss" x-on:click="$store.toast.dismiss(item.id)">✕</button>
          </div>
        </template>
      </div>
    </div>
    <!-- App code (single ES module entry — Vite bundles all imports) -->
  </body>
</html>
