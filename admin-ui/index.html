<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <base target="_top" />
    <title>水道検針 管理画面</title>
    <!-- TrustedTypes shim: GAS enforces Trusted Types CSP which blocks inline scripts -->
    <script>
      if (window.trustedTypes && window.trustedTypes.createPolicy) {
        window.trustedTypes.createPolicy('default', {
          createHTML: function (string) {
            return string;
          },
          createScriptURL: function (string) {
            return string;
          },
          createScript: function (string) {
            return string;
          },
        });
      }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1/css/bulma.min.css" />
    <style>
      /* ── Design System: Bulma lightness variables ── */

      /* ── Light Mode (Bulma lightness variables) ── */
      [data-theme='light'],
      :root {
        --bulma-scheme-h: 220;
        --bulma-scheme-s: 14%;
        --bulma-scheme-main-l: 97%;
        --bulma-scheme-main-bis-l: 98%;
        --bulma-scheme-main-ter-l: 96%;
        --bulma-scheme-invert-l: 8%;
        --bulma-scheme-invert-bis-l: 12%;
        --bulma-scheme-invert-ter-l: 20%;
        --bulma-background-l: 96%;
        --bulma-border-l: 90%;
        --bulma-border-weak-l: 93%;
        --bulma-text-l: 12%;
        --bulma-text-weak-l: 42%;
        --bulma-text-strong-l: 12%;
        --bulma-text-title-l: 12%;
        --bulma-soft-l: 90%;
        --bulma-bold-l: 20%;
        --bulma-soft-invert-l: 20%;
        --bulma-bold-invert-l: 90%;
        --bulma-primary-h: 217;
        --bulma-primary-s: 91%;
        --bulma-primary-l: 60%;
        --bulma-primary-invert-l: 100%;
        --bulma-link-h: 217;
        --bulma-link-s: 91%;
        --bulma-link-l: 60%;
        --bulma-link-invert-l: 100%;
        --bulma-box-background-color: #ffffff;
        --bulma-box-radius: 8px;
      }

      /* ── Dark Mode (Bulma lightness variables) ── */
      [data-theme='dark'] {
        --bulma-scheme-main-l: 2%;
        --bulma-scheme-main-bis-l: 7%;
        --bulma-scheme-main-ter-l: 8%;
        --bulma-scheme-invert-l: 98%;
        --bulma-scheme-invert-bis-l: 94%;
        --bulma-scheme-invert-ter-l: 88%;
        --bulma-background-l: 5%;
        --bulma-border-l: 15%;
        --bulma-border-weak-l: 15%;
        --bulma-text-l: 98%;
        --bulma-text-weak-l: 64%;
        --bulma-text-strong-l: 98%;
        --bulma-text-title-l: 98%;
        --bulma-soft-l: 12%;
        --bulma-bold-l: 90%;
        --bulma-soft-invert-l: 90%;
        --bulma-bold-invert-l: 12%;
        --bulma-primary-invert-l: 100%;
        --bulma-link-invert-l: 100%;

        /* Color component overrides for tags, badges, notifications in dark mode */
        --bulma-light-l: 15%;
        --bulma-light-invert-l: 96%;
        --bulma-success-l: 30%;
        --bulma-success-invert-l: 96%;
        --bulma-danger-l: 35%;
        --bulma-danger-invert-l: 96%;
        --bulma-warning-l: 35%;
        --bulma-warning-invert-l: 10%;
        --bulma-info-l: 35%;
        --bulma-info-invert-l: 96%;
        --bulma-primary-l: 35%;
        --bulma-link-l: 35%;
        --bulma-box-background-color: #141414;
      }

      /* ── Layout ── */
      .sidebar {
        min-height: 100vh;
        background: var(--bulma-box-background-color);
        padding: 1rem;
        border-right: 1px solid var(--bulma-border);
        transition: transform 0.3s ease;
      }
      .sidebar-menu {
        padding-top: 1rem;
      }
      .sidebar-menu .menu-label {
        font-size: 0.75rem;
        letter-spacing: 0.05em;
      }
      .sidebar-menu .menu-list a {
        padding: 0.5em 0.75em;
        border-radius: 6px;
      }
      .sidebar-menu .menu-list a.is-active {
        background: var(--bulma-primary);
        color: var(--bulma-primary-invert);
      }
      .sidebar-menu .menu-list a:hover {
        background: var(--bulma-scheme-main);
      }
      .main-content {
        padding: 2rem;
      }
      body {
        background-color: var(--bulma-scheme-main);
        color: var(--bulma-text);
      }
      .admin-header {
        background: var(--bulma-primary);
        color: var(--bulma-primary-invert);
        padding: 0.75rem 1.5rem;
      }
      .admin-header .navbar-item {
        color: var(--bulma-primary-invert);
      }
      .box {
        border: 1px solid var(--bulma-border);
      }
      .input {
        border-color: var(--bulma-border);
      }
      .input:focus {
        border-color: var(--bulma-primary);
      }

      /* ── Theme Toggle ── */
      .theme-toggle-btn {
        background: transparent;
        border: 1px solid var(--bulma-border);
        border-radius: 6px;
        padding: 0.3rem 0.6rem;
        cursor: pointer;
        font-size: 1.1rem;
        line-height: 1;
        color: var(--bulma-text);
        transition:
          background 0.2s,
          border-color 0.2s;
      }
      .theme-toggle-btn:hover {
        background: var(--bulma-scheme-main-bis);
      }

      /* ── Toast Notifications ── */
      .toast-container {
        position: fixed;
        top: 1rem;
        right: 1rem;
        z-index: 9999;
        max-width: 400px;
      }
      .toast-item {
        padding: 0.75rem 1rem;
        border-radius: 6px;
        margin-bottom: 0.5rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        display: flex;
        justify-content: space-between;
        align-items: center;
        animation: toast-in 0.3s ease-out;
      }
      .toast-item.is-success {
        background: #f0fdf4;
        color: #166534;
        border: 1px solid #bbf7d0;
      }
      .toast-item.is-warning {
        background: #fefce8;
        color: #854d0e;
        border: 1px solid #fef08a;
      }
      .toast-item.is-error {
        background: #fef2f2;
        color: #991b1b;
        border: 1px solid #fecaca;
      }
      .toast-item.is-info {
        background: #eff6ff;
        color: #1e40af;
        border: 1px solid #bfdbfe;
      }
      [data-theme='dark'] .toast-item.is-success {
        background: #052e16;
        color: #86efac;
        border-color: #166534;
      }
      [data-theme='dark'] .toast-item.is-warning {
        background: #422006;
        color: #fde047;
        border-color: #854d0e;
      }
      [data-theme='dark'] .toast-item.is-error {
        background: #450a0a;
        color: #fca5a5;
        border-color: #991b1b;
      }
      [data-theme='dark'] .toast-item.is-info {
        background: #172554;
        color: #93c5fd;
        border-color: #1e40af;
      }
      .toast-dismiss {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1.1rem;
        margin-left: 0.75rem;
        opacity: 0.6;
        padding: 0;
        line-height: 1;
      }
      .toast-dismiss:hover {
        opacity: 1;
      }
      @keyframes toast-in {
        from {
          opacity: 0;
          transform: translateX(100%);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* ── Mobile Responsive ── */
      @media (max-width: 768px) {
        .sidebar {
          position: fixed;
          top: 0;
          left: 0;
          bottom: 0;
          width: 260px;
          z-index: 100;
          transform: translateX(-100%);
        }
        .sidebar.is-open {
          transform: translateX(0);
        }
        .sidebar-overlay {
          display: none;
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: rgba(0, 0, 0, 0.4);
          z-index: 99;
        }
        .sidebar-overlay.is-active {
          display: block;
        }
        .sidebar-header-desktop {
          display: none;
        }
        .hamburger-btn {
          display: inline-flex;
        }
      }
      @media (min-width: 769px) {
        .hamburger-btn {
          display: none;
        }
        .sidebar-overlay {
          display: none !important;
        }
      }
    </style>

    <!-- Mock system (dev only — stripped by Vite plugin in production build) -->
    <script src="/mock/data.js"></script>
    <script src="/mock/dispatcher.js"></script>
    <script src="/mock/google-script.js"></script>
  </head>
  <body>
    <div x-data>
      <!-- Auth Gate -->
      <template x-if="!$store.auth.authenticated">
        <section class="hero is-fullheight" style="position: relative">
          <div style="position: absolute; top: 1rem; right: 1rem">
            <button
              class="theme-toggle-btn"
              aria-label="テーマ切替"
              x-on:click="$store.theme.toggle()"
              x-text="$store.theme.dark ? '☀️' : '🌙'"
            ></button>
          </div>
          <div class="hero-body">
            <div class="container has-text-centered" style="max-width: 400px">
              <div class="box">
                <h1 class="title is-4">水道検針 管理画面</h1>
                <p class="subtitle is-6 has-text-grey-light">管理パスワードを入力してください</p>

                <div x-data="authGate">
                  <label class="is-sr-only" for="admin-password">管理パスワード</label>
                  <div class="field">
                    <div class="control">
                      <input
                        class="input"
                        type="password"
                        id="admin-password"
                        placeholder="管理パスワード"
                        required
                        x-model="token"
                        x-on:keydown.enter="submit"
                        x-bind:disabled="loading"
                        x-on:input="error = ''"
                      />
                    </div>
                  </div>
                </div>

                <!-- Data Maintenance -->

                  <div
                    x-show="error"
                    x-text="error"
                    class="notification is-danger is-light mb-3"
                    role="alert"
                    style="font-size: 0.85rem"
                  ></div>

                  <button
                    class="button is-primary is-fullwidth"
                    x-bind:class="{ 'is-loading': loading }"
                    x-on:click="submit"
                    x-text="loading ? '認証中...' : 'ログイン'"
                  ></button>

                  <template x-if="!window.google">
                    <p class="mt-4 is-size-7 has-text-grey-light">
                      ※ ローカル開発時は「test-token」を入力
                    </p>
                  </template>
                </div>
              </div>
            </div>
          </div>
        </section>
      </template>

      <!-- Main Admin UI -->
      <template x-if="$store.auth.authenticated">
        <div x-data="adminApp">
          <div
            class="sidebar-overlay"
            x-bind:class="{ 'is-active': sidebarOpen }"
            x-on:click="closeSidebar"
          ></div>
          <div class="columns is-gapless">
            <!-- Sidebar -->
            <div class="column is-2 sidebar" x-bind:class="{ 'is-open': sidebarOpen }">
              <div class="admin-header mb-4 sidebar-header-desktop">
                <strong class="has-text-primary-invert">🚰 水道検針 管理</strong>
              </div>

              <nav class="menu sidebar-menu" aria-label="管理メニュー">
                <p class="menu-label">メニュー</p>
                <ul class="menu-list">
                  <template x-for="tab in tabs" :key="tab.id">
                    <li>
                      <a
                        x-bind:class="{ 'is-active': activeTab === tab.id }"
                        x-bind:aria-current="activeTab === tab.id ? 'page' : null"
                        x-on:click="switchTab(tab.id)"
                        x-text="tab.icon + ' ' + tab.label"
                      ></a>
                    </li>
                  </template>
                </ul>
              </nav>

              <div class="mt-6">
                <button class="button is-small is-light" x-on:click="logout">ログアウト</button>
              </div>
            </div>

            <!-- Content Area -->
            <div class="column">
              <div
                class="admin-header is-flex is-justify-content-space-between is-align-items-center"
              >
                <div class="is-flex is-align-items-center">
                  <button
                    class="hamburger-btn button is-small is-ghost has-text-primary-invert mr-2"
                    aria-label="メニューを開く"
                    x-bind:aria-expanded="sidebarOpen"
                    x-on:click="toggleSidebar"
                  >
                    ☰
                  </button>
                  <strong class="has-text-primary-invert is-hidden-desktop"
                    >🚰 水道検針 管理</strong
                  >
                  <span
                    class="has-text-primary-invert"
                    style="opacity: 0.7"
                    x-text="'/ ' + activeTabLabel"
                  ></span>
                </div>
                <button
                  class="theme-toggle-btn"
                  aria-label="テーマ切替"
                  x-on:click="$store.theme.toggle()"
                  x-text="$store.theme.dark ? '☀️' : '🌙'"
                ></button>
              </div>
              <div class="main-content">
                <!-- Dashboard -->
                <div x-show="activeTab === 'dashboard'" x-data="dashboard">
                  <div x-show="loading" class="has-text-centered py-6">
                    <button class="button is-loading is-large is-static"></button>
                    <p class="mt-3 has-text-grey-light">読み込み中...</p>
                  </div>
                  <div x-show="!loading && error" class="notification is-danger" role="alert">
                    <p x-text="error"></p>
                    <button class="button is-small is-light mt-2" x-on:click="refresh()">
                      再試行
                    </button>
                  </div>
                  <div x-show="!loading && data">
                    <div
                      class="is-flex is-justify-content-space-between is-align-items-center mb-3"
                    >
                      <p class="heading mb-0">ダッシュボード</p>
                      <button class="button is-small is-light" x-on:click="refresh()">
                        🔄 更新
                      </button>
                    </div>
                    <div class="columns is-multiline">
                      <div class="column is-3">
                        <div class="box has-text-centered">
                          <p class="heading">物件数</p>
                          <p
                            class="title has-text-primary"
                            x-text="data ? data.propertyCount : 0"
                          ></p>
                        </div>
                      </div>
                      <div class="column is-3">
                        <div class="box has-text-centered">
                          <p class="heading">総部屋数</p>
                          <p class="title" x-text="data ? data.totalRooms : 0"></p>
                        </div>
                      </div>
                      <div class="column is-3">
                        <div class="box has-text-centered">
                          <p class="heading">検針済み</p>
                          <p
                            class="title has-text-success"
                            x-text="data ? data.completedRooms : 0"
                          ></p>
                        </div>
                      </div>
                      <div class="column is-3">
                        <div class="box has-text-centered">
                          <p class="heading">完了率</p>
                          <p
                            class="title"
                            x-bind:class="completionColor()"
                            x-text="data ? data.completionRate + '%' : '0%'"
                          ></p>
                        </div>
                      </div>
                    </div>
                    <div
                      x-show="properties && properties.length === 0 && !loading"
                      class="has-text-centered py-4"
                    >
                      <p class="has-text-grey-light">
                        物件が登録されていません。<a
                          href="#"
                          class="has-text-link"
                          x-on:click.prevent="switchTab('setup')"
                          >初期設定ウィザードを実行</a
                        >してください。
                      </p>
                    </div>
                    <div x-show="data && data.spreadsheetInfo" class="box mb-4">
                      <p class="heading">スプレッドシート</p>
                      <p
                        x-show="data && data.spreadsheetInfo"
                        x-text="data && data.spreadsheetInfo ? data.spreadsheetInfo.name : ''"
                      ></p>
                      <a
                        x-show="data && data.spreadsheetInfo && data.spreadsheetInfo.url"
                        x-bind:href="data && data.spreadsheetInfo ? data.spreadsheetInfo.url : '#'"
                        target="_blank"
                        class="is-size-7"
                        >シートを開く</a
                      >
                    </div>
                    <div x-show="properties && properties.length > 0">
                      <p class="heading mb-3">物件一覧</p>
                      <table class="table is-fullwidth is-hoverable">
                        <thead>
                          <tr>
                            <th>物件名</th>
                            <th>部屋数</th>
                            <th>検針済み</th>
                            <th>状態</th>
                            <th>操作</th>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="prop in properties" :key="prop.id || prop.propertyId">
                            <tr>
                              <td x-text="prop.name || prop.propertyName"></td>
                              <td x-text="prop.roomCount || '-'"></td>
                              <td x-text="prop.completedCount || 0"></td>
                              <td>
                                <span
                                  class="tag"
                                  x-bind:class="prop.completedCount === prop.roomCount ? 'is-primary' : prop.completedCount > 0 ? 'is-success' : 'is-light'"
                                  x-text="prop.completedCount === prop.roomCount ? '完了' : prop.completedCount > 0 ? '検針中' : '未着手'"
                                ></span>
                              </td>
                              <td>
                                <button
                                  class="button is-small is-info"
                                  x-on:click="$store.app.setActiveTab('properties'); history.pushState(null, '', '#properties')"
                                >
                                  管理
                                </button>
                              </td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

                <!-- Property Management -->
                <div x-show="activeTab === 'properties'" x-data="propertyManagement">
                  <div class="is-flex is-justify-content-space-between is-align-items-center mb-4">
                    <p class="title is-4 mb-0">🏠 物件管理</p>
                    <button class="button is-primary" x-on:click="openAddProperty()">
                      + 物件を追加
                    </button>
                  </div>

                  <div x-show="loading" class="has-text-centered py-5">
                    <button class="button is-loading is-large is-static"></button>
                    <p class="mt-3 has-text-grey-light">読み込み中...</p>
                  </div>

                  <div x-show="!loading && error" class="notification is-danger" role="alert">
                    <p x-text="error"></p>
                    <button class="button is-small is-light mt-2" x-on:click="loadProperties()">
                      再試行
                    </button>
                  </div>

                  <div x-show="!loading && properties.length === 0" class="has-text-centered py-6">
                    <p class="has-text-grey-light">
                      物件が登録されていません。「+ 物件を追加」ボタンで物件を登録してください。
                    </p>
                  </div>

                  <div x-show="!loading && properties.length > 0">
                    <table class="table is-fullwidth is-hoverable">
                      <thead>
                        <tr>
                          <th>物件ID</th>
                          <th>物件名</th>
                          <th>操作</th>
                        </tr>
                      </thead>
                      <tbody>
                        <template x-for="prop in properties" :key="getPropId(prop)">
                          <tr>
                            <td x-text="getPropId(prop)"></td>
                            <td x-text="getPropName(prop)"></td>
                            <td>
                              <div class="field is-grouped">
                                <button
                                  class="button is-small is-info"
                                  x-on:click="selectProperty(prop)"
                                  x-text="selectedProperty && getPropId(selectedProperty) === getPropId(prop) ? '閉じる' : '部屋管理'"
                                ></button>
                                <button
                                  class="button is-small is-danger is-light"
                                  x-on:click="openDeleteConfirm('property', getPropId(prop), getPropName(prop), '')"
                                >
                                  削除
                                </button>
                              </div>
                            </td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>

                  <!-- Room management for selected property -->
                  <div x-show="selectedProperty && !roomsLoading" class="box mt-4">
                    <div
                      class="is-flex is-justify-content-space-between is-align-items-center mb-3"
                    >
                      <p
                        class="heading mb-0"
                        x-text="getPropName(selectedProperty) + ' の部屋一覧'"
                      ></p>
                      <button class="button is-small is-primary" x-on:click="openAddRoom()">
                        + 部屋を追加
                      </button>
                    </div>
                    <div x-show="rooms.length === 0" class="has-text-centered py-3">
                      <p class="has-text-grey-light is-size-7">部屋が登録されていません</p>
                    </div>
                    <table x-show="rooms.length > 0" class="table is-fullwidth is-hoverable">
                      <thead>
                        <tr>
                          <th>部屋ID</th>
                          <th>部屋名</th>
                          <th>検針実績</th>
                          <th>操作</th>
                        </tr>
                      </thead>
                      <tbody>
                        <template x-for="room in rooms" :key="room.roomId">
                          <tr>
                            <td x-text="room.roomId"></td>
                            <td x-text="room.roomName"></td>
                            <td>
                              <span
                                class="tag is-small"
                                x-bind:class="room.hasInspectionResult ? 'is-success' : 'is-light'"
                                x-text="room.hasInspectionResult ? 'あり' : 'なし'"
                              ></span>
                            </td>
                            <td>
                              <div class="field is-grouped">
                                <button
                                  class="button is-small is-light"
                                  x-on:click="openEditRoom(room)"
                                >
                                  編集
                                </button>
                                <button
                                  class="button is-small is-danger is-light"
                                  x-bind:disabled="room.hasInspectionResult"
                                  x-bind:title="room.hasInspectionResult ? '検針実績があるため削除できません' : ''"
                                  x-on:click="openDeleteConfirm('room', room.roomId, room.roomName, getPropId(selectedProperty))"
                                >
                                  削除
                                </button>
                              </div>
                            </td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                  <div x-show="roomsLoading" class="has-text-centered py-3">
                    <button class="button is-loading is-static"></button>
                  </div>
                  <div
                    x-show="selectedProperty && roomsError"
                    class="notification is-danger is-light mt-3"
                  >
                    <p x-text="roomsError"></p>
                    <button
                      class="button is-small is-light mt-2"
                      x-on:click="selectProperty(selectedProperty)"
                    >
                      再試行
                    </button>
                  </div>

                  <!-- Property Management Modals -->
                  <div
                    class="modal"
                    role="dialog"
                    aria-modal="true"
                    aria-labelledby="modal-addProperty-title"
                    x-bind:class="{ 'is-active': activeModal === 'addProperty' }"
                  >
                    <div class="modal-background" x-on:click="closeModal()"></div>
                    <div class="modal-card">
                      <header class="modal-card-head">
                        <p class="modal-card-title" id="modal-addProperty-title">物件を追加</p>
                        <button
                          class="delete"
                          aria-label="閉じる"
                          x-on:click="closeModal()"
                        ></button>
                      </header>
                      <section class="modal-card-body">
                        <div
                          x-show="error"
