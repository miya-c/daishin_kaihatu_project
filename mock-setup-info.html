<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水道検針アプリ - セットアップ案内</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e3f2fd 0%, #f5f5f5 100%);
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }
    .card-header {
      background: #1976d2;
      color: white;
      padding: 32px 24px 24px;
      text-align: center;
    }
    .card-icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }
    .card-header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .card-header p {
      opacity: 0.85;
      font-size: 0.875rem;
    }
    .card-body {
      padding: 24px;
      text-align: center;
    }
    .card-body p {
      color: #555;
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 16px;
    }
    .steps {
      text-align: left;
      background: #f8f9fa;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
    }
    .steps h3 {
      font-size: 0.85rem;
      color: #1976d2;
      margin-bottom: 12px;
      text-align: center;
    }
    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .step:last-child { margin-bottom: 0; }
    .step-num {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      background: #1976d2;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .step-text {
      font-size: 0.85rem;
      color: #444;
      line-height: 1.5;
      padding-top: 2px;
    }
    .contact-box {
      background: #e3f2fd;
      border-radius: 10px;
      padding: 16px;
      margin-top: 4px;
    }
    .contact-box p {
      font-size: 0.8rem;
      color: #1565c0;
      margin-bottom: 0;
    }
    .contact-label {
      font-weight: 600;
      font-size: 0.75rem;
      color: #1976d2;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="card-icon">💧</div>
      <h1>水道検針アプリ</h1>
      <p>初期設定が必要です</p>
    </div>
    <div class="card-body">
      <p>このアプリを利用するには、管理者からのセットアップURLが必要です。</p>

      <div class="steps">
        <h3>セットアップ手順</h3>
        <div class="step">
          <div class="step-num">1</div>
          <div class="step-text">管理者から送付されたURLを受信する</div>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <div class="step-text">URLをタップしてアプリを開く</div>
        </div>
        <div class="step">
          <div class="step-num">3</div>
          <div class="step-text">設定が自動的に完了します</div>
        </div>
      </div>

      <div class="contact-box">
        <div class="contact-label">お問い合わせ</div>
        <p>セットアップURLをお持ちでない場合は、管理者にお問い合わせください。</p>
      </div>
    </div>
  </div>
</body>
</html>
