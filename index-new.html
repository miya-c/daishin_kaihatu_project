<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水道検針アプリ</title>
  <link rel="manifest" href="/manifest.json">
  
  <!-- iOS用メタタグ -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="水道検針">
  
  <!-- Android用メタタグ -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="水道検針">
  
  <!-- Fonts with optimized loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- PWA detection and redirect script -->
  <script>
    // PWA起動時の即座リダイレクト
    (function() {
      const isPWAMode = window.matchMedia('(display-mode: standalone)').matches || 
                       window.navigator.standalone === true ||
                       new URLSearchParams(window.location.search).get('pwa') === 'true';
      
      if (isPWAMode) {
        window.location.replace('/property_select');
        return;
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/install.jsx"></script>
  
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/service-worker.js');
      });
    }
  </script>
</body>
</html>
