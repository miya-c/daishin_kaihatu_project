  <script>
    // Page restoration handling
    function hideLoadingOnPageShow() {
      const loadingElements = document.querySelectorAll('.loading-container, .MuiCircularProgress-root');
      loadingElements.forEach(element => {
        if (element) {
          element.style.display = 'none';
          element.style.visibility = 'hidden';
          element.style.opacity = '0';
          element.style.pointerEvents = 'none';
          element.style.zIndex = '-1';
        }
      });
      
      const rootElement = document.getElementById('root');
      if (rootElement) {
        rootElement.classList.remove('styles-loading');
        rootElement.classList.add('styles-loaded');
      }
      
      document.body.style.overflow = '';
      document.body.style.pointerEvents = '';
      
      window.forceHideLoading = true;
    }

    window.addEventListener('pageshow', function(event) {
      hideLoadingOnPageShow();
      
      setTimeout(() => {
        window.dispatchEvent(new CustomEvent('forceHideLoading'));
      }, 100);
    });
  </script>
