<!doctype html>
<html lang="ja">

    <base target="_top" />
    <title>ライセンス管理 管理画面</title>
    <!-- TrustedTypes shim: GAS enforces Trusted Types CSP which blocks inline scripts -->
    <script>
      if (window.trustedTypes && window.trustedTypes.createPolicy) {
        window.trustedTypes.createPolicy('default', {
          createHTML: function (string) {
            if (/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi.test(string)) {
              console.error('[TrustedTypes] Blocked script injection in HTML');
              return '';
            }
            return string;
          },
          createScriptURL: function (string) {
            var allowed = [
              'https://cdn.jsdelivr.net/npm/alpinejs',
              'https://cdn.jsdelivr.net/npm/bulma',
              'https://cdn.jsdelivr.net/npm/@alpinejs',
            ];
            for (var i = 0; i < allowed.length; i++) {
              if (string.indexOf(allowed[i]) === 0) return string;
            }
            console.error('[TrustedTypes] Blocked disallowed script URL: ' + string);
            return '';
          },
          createScript: function (string) {
            return string;
          },
        });
      }
    </script>
    <script>
      // Apply theme immediately to prevent FOUC
      (function() {
        var saved = localStorage.getItem('license-admin-theme') || 'blue';
        document.documentElement.setAttribute('data-theme', saved);
      })();
    </script>

      /* ══════════════════════════════════════════════ */

        --text-faint: hsl(220, 14%, 75%);

        --accent-text: hsl(217, 91%, 60%);
        --accent-bg: hsl(217, 91%, 60%);

        /* Sidebar active */

        /* Status colors */
        --status-active: hsl(153, 53%, 45%);

        --status-expiring: hsl(42, 100%, 45%);

        --status-revoked: hsl(0, 84%, 60%);

        /* Shadows */
        --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        --shadow-modal: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        --shadow-focus: 0 0 0 0.125em hsla(217, 91%, 60%, 0.25);

        /* Code */
        --code-bg: hsl(220, 14%, 96%);

        /* Modal overlay */
        --modal-overlay: rgba(0, 0, 0, 0.4);

        /* Buttons */
        --btn-primary-bg: hsl(217, 91%, 60%);

        --btn-primary-hover: hsl(217, 91%, 50%);
        --btn-default-bg: #ffffff;
        --btn-default-text: hsl(220, 14%, 42%);
        --btn-default-border: hsl(0, 0%, 90%);
        --btn-default-hover-bg: hsl(220, 14%, 96%);
        --btn-info-bg: var(--bg-card);
        --btn-info-text: #aaaaaa;

      /* ══════════════════════════════════════════════ */
      /* SHARED CSS (uses variables for theming)        */
      /* ══════════════════════════════════════════════ */

      body {
        background-color: var(--bg-base);
        color: var(--text-primary);
      }

      /* ── Layout ── */
      .sidebar {
        min-height: 100vh;
        background: var(--bg-sidebar);
        padding: 1rem;
        border-right: 1px solid var(--border-subtle);
        transition: transform 0.3s ease;
      }
      .sidebar-menu {
        padding-top: 1rem;
      }
      .sidebar-menu .menu-label {
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        color: var(--text-weak);
      }
      .sidebar-menu .menu-list a {
        padding: 0.5em 0.75em;
        border-radius: 8px;
        transition: background 0.2s, color 0.2s;
        color: var(--text-secondary);
      }
      .sidebar-menu .menu-list a.is-active {
        background: var(--sidebar-active-bg);
        color: var(--sidebar-active-text);
        font-weight: 600;
      }
      .sidebar-menu .menu-list a:hover:not(.is-active) {
        background: var(--sidebar-hover-bg);
        color: var(--text-primary);
      }
      .main-content {
        padding: 2rem;
      }
      .admin-header {
        background: var(--bg-header);
        color: var(--header-text);
        padding: 0.75rem 1.5rem;
        border-bottom: 1px solid var(--border-subtle);
      }
      .admin-header .navbar-item,
      .admin-header strong,
      .admin-header span,
      .admin-header button {
        color: var(--header-text);
      }

      /* ── Box / Cards ── */
      .box {
        background: var(--bg-card);
        border: 1px solid var(--border-base);
        border-radius: 8px;
        box-shadow: var(--shadow-card);
        color: var(--text-primary);
      }

      /* ── Summary Cards ── */
      .summary-bar {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .summary-card {
        background: var(--bg-card);
        border-radius: 8px;
        padding: 1rem 1.5rem;
        border: 1px solid var(--border-base);
        box-shadow: var(--shadow-card);
        flex: 1;
        min-width: 180px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.25rem;
      }
      .summary-card .lbl {
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-secondary);
      }
      .summary-card .num {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--text-primary);
      }

      /* ── Status color classes (replaces inline styles) ── */
      .status-active-color { color: var(--status-active) !important; }
      .status-expiring-color { color: var(--status-expiring) !important; }
      .status-revoked-color { color: var(--status-revoked) !important; }

      /* ── Header text classes ── */
      .header-text { color: var(--header-text) !important; }
      .header-text-muted { color: var(--header-text-muted) !important; }

      /* ── Inputs ── */
      .input, .select select, .textarea {
        background-color: var(--bg-input);
        color: var(--text-primary);
        border-color: var(--border-input);
        border-radius: 8px;
      }
      .input::placeholder, .textarea::placeholder {
        color: var(--text-faint);
      }
      .input:focus, .select select:focus, .textarea:focus {
        border-color: var(--accent);
        box-shadow: var(--shadow-focus);
        background-color: var(--bg-input);
        color: var(--text-primary);
      }

      /* ── Select dropdown styling ── */
      .select select {
        background-color: var(--bg-input);
        color: var(--text-primary);
      }
      .select select option {
        background: var(--bg-card);
        color: var(--text-primary);
      }

      /* ── Tables ── */
      .table {
        background-color: var(--bg-card);
        color: var(--text-primary);
      }
      .table thead th {
        background: var(--bg-table-head);
        color: var(--text-secondary);
        border-bottom: 1px solid var(--border-base);
      }
      .table tbody td {
        color: var(--table-body-text);
        border-bottom: 1px solid var(--table-body-border);
      }
      .table tbody tr:nth-child(even) {
        background: var(--bg-table-even);
      }
      .table tbody tr:hover,
      .table.is-hoverable tbody tr:hover {
        background: var(--bg-table-hover);
      }
      .content-scroll {
        overflow-x: auto;
        border-radius: 8px;
        border: 1px solid var(--border-base);
      }
      .columns.is-gapless > .column:not(.sidebar) {
        min-width: 0;
      }

      /* ── Toast ── */
      .toast-container {
        position: fixed;
        top: 1.5rem;
        right: 1.5rem;
        z-index: 9999;
        max-width: 400px;
      }
      .toast-item {
        padding: 0.75rem 1.25rem;
        margin-bottom: 0.75rem;
        border-radius: 8px;
        box-shadow: var(--shadow-modal);
        background-color: var(--bg-card);
        color: var(--text-primary);
        border: none;
        border-left: 4px solid var(--accent);
        display: flex;
        justify-content: space-between;
        align-items: center;
        animation: toast-in 0.3s ease-out;
      }
      .toast-item.is-success { border-left-color: var(--toast-success); }
      .toast-item.is-warning { border-left-color: var(--toast-warning); }
      .toast-item.is-error { border-left-color: var(--toast-error); }
      @keyframes toast-in {
        from { opacity: 0; transform: translateX(100%); }
        to { opacity: 1; transform: translateX(0); }
      }

      /* ── Copy Button ── */
      .copy-btn {
        background: none;
        border: 1px solid var(--copy-border);
        border-radius: 4px;
        padding: 0.15rem 0.4rem;
        font-size: 0.7rem;
        cursor: pointer;
        color: var(--copy-text);
        transition: background 0.2s, border-color 0.2s;
        vertical-align: middle;
        margin-left: 0.35rem;
      }
      .copy-btn:hover {
        background: var(--copy-hover-bg);
        border-color: var(--copy-hover-border);
        color: var(--copy-hover-text);
      }

      /* ── Script ID Display ── */
      .script-id-cell {
        font-family: monospace;
        font-size: 0.82rem;
        white-space: nowrap;
      }
      .script-id-truncated {
        display: inline-block;
        max-width: 140px;
        overflow: hidden;
        text-overflow: ellipsis;
        vertical-align: middle;
      }

      /* ── Mobile Responsive ── */
      @media (max-width: 768px) {
        .sidebar {
          position: fixed;
          top: 0;
          left: 0;
          bottom: 0;
          width: 260px;
          z-index: 100;
          transform: translateX(-100%);
        }
        .sidebar.is-open {
          transform: translateX(0);
        }
        .sidebar-overlay {
          display: none;
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: var(--modal-overlay);
          z-index: 99;
        }
        .sidebar-overlay.is-active {
          display: block;
        }
        .sidebar-header-desktop {
          display: none;
        }
        .hamburger-btn {
          display: inline-flex !important;
        }
      }
      @media (min-width: 769px) {
        .hamburger-btn {
          display: inline-flex !important;
        }
        .sidebar-overlay {
          display: none !important;
        }
      }

      /* ── Status Tag Colors ── */
      .tag.is-active-tag {
        background-color: var(--status-active-bg);
        color: var(--status-active-text);
      }
      .tag.is-expiring-tag {
        background-color: var(--status-expiring-bg);
        color: var(--status-expiring-text);
      }
      .tag.is-revoked-tag {
        background-color: var(--status-revoked-bg);
        color: var(--status-revoked-text);
      }

      /* ── Filter Bar ── */
      .filter-bar {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }

      /* ── App Icon ── */
      .app-icon {
        display: inline-block;
        margin-right: 0.35rem;
      }

      /* ── Action Buttons ── */
      .action-btn-group {
        display: flex;
        gap: 0.35rem;
      }

      /* ── Titles ── */
      .title, .modal-card-title {
        color: var(--text-title);
      }
      .subtitle {
        color: var(--text-weak);
      }
      .heading {
        color: var(--text-secondary);
        letter-spacing: 0.05em;
      }

      /* ── Labels ── */
      .label {
        color: var(--text-secondary);
      }

      /* ── Help text ── */
      .help {
        color: var(--text-weak);
      }

      /* ── Code element ── */
      code {
        background: var(--code-bg);
        color: var(--code-text);
        padding: 0.1em 0.4em;
        border-radius: 3px;
      }

      /* ── Buttons - Primary ── */
      .button.is-primary {
        background-color: var(--btn-primary-bg);
        color: var(--btn-primary-text);
        border: none;
      }
      .button.is-primary:hover {
        background-color: var(--btn-primary-hover);
      }

      /* ── Buttons - Info Light ── */
      .button.is-info.is-light {
        background-color: var(--btn-info-bg);
        color: var(--btn-info-text);
        border: 1px solid var(--btn-info-border);
      }
      .button.is-info.is-light:hover {
        background-color: var(--btn-info-hover-bg);
        color: var(--accent-text);
        border-color: var(--accent);
      }

      /* ── Buttons - Danger Light ── */
      .button.is-danger.is-light {
        background-color: var(--btn-danger-bg);
        color: var(--btn-danger-text);
        border: 1px solid var(--btn-danger-border);
      }
      .button.is-danger.is-light:hover {
        background-color: var(--btn-danger-bg);
        color: var(--btn-danger-text);
        border-color: var(--btn-danger-text);
      }

      /* ── Buttons - Danger ── */
      .button.is-danger {
        background-color: var(--btn-delete-bg);
        color: var(--btn-delete-text);
        border: none;
      }
      .button.is-danger:hover {
        background-color: var(--btn-delete-bg);
        opacity: 0.9;
      }

      /* ── Buttons - Default ── */
      .button {
        background-color: var(--btn-default-bg);
        color: var(--btn-default-text);
        border: 1px solid var(--btn-default-border);
      }
      .button:hover {
        background-color: var(--btn-default-hover-bg);
        color: var(--text-primary);
        border-color: var(--btn-default-border);
      }

      /* ── Buttons - Ghost ── */
      .button.is-ghost {
        color: var(--header-text);
        background: transparent;
        border: none;
      }
      .button.is-ghost:hover {
        color: var(--accent-text);
        background: rgba(128, 128, 128, 0.05);
      }

      /* ── Buttons - Small Light ── */
      .button.is-small.is-light {
        background: transparent;
        color: var(--text-secondary);
        border: 1px solid var(--border-input);
      }
      .button.is-small.is-light:hover {
        background: var(--bg-card);
        color: var(--text-primary);
      }

      /* ── Modal ── */
      .modal-card {
        background: var(--bg-card);
        border: 1px solid var(--border-modal);
        border-radius: 8px;
        overflow: hidden;
      }
      .modal-card-head {
        background: var(--bg-elevated);
        border-bottom: 1px solid var(--border-base);
        border-radius: 0;
      }
      .modal-card-title {
        color: var(--text-title);
      }
      .modal-card-body {
        background: var(--bg-card);
        color: var(--text-primary);
      }
      .modal-card-foot {
        background: var(--bg-elevated);
        border-top: 1px solid var(--border-base);
        border-radius: 0;
      }
      .modal-background {
        background-color: var(--modal-overlay);
      }
      .modal-card-head .delete {
        background-color: var(--modal-delete-bg);
      }
      .modal-card-head .delete::before,
      .modal-card-head .delete::after {
        background-color: var(--text-primary);
      }

      /* ── Notification ── */
      .notification {
        background: var(--bg-card);
        color: var(--text-primary);
      }
      .notification.is-danger.is-light {
        background: var(--notif-danger-bg);
        color: var(--notif-danger-text);
        border: 1px solid var(--notif-danger-border);
      }

      /* ── Login screen hero ── */
      .hero {
        background-color: var(--bg-base);
      }
      .hero-body {
        background-color: var(--bg-base);
      }
      .hero .box {
        background: var(--login-bg);
        border: 1px solid var(--login-border);
      }
      .hero .title {
        color: var(--login-title);
      }
      .hero .subtitle {
        color: var(--login-subtitle);
      }
      .hero .has-text-grey-light {
        color: var(--text-weak) !important;
      }

      /* ── Grey utility overrides ── */
      .has-text-grey {
        color: var(--text-weak) !important;
      }
      .has-text-grey-light {
        color: var(--text-faint) !important;
      }
      .has-text-weight-semibold {
        color: var(--text-primary);
      }
      .has-text-primary {
        color: var(--accent-text) !important;
      }

      /* ── Hamburger button style ── */
      .hamburger-btn {
        color: var(--header-text) !important;
      }

      /* ══════════════════════════════════════════════ */
      /* Theme Switcher                                 */
      /* ══════════════════════════════════════════════ */
      .theme-switcher {
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .theme-btn {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.3);
        background: transparent;
        cursor: pointer;
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: border-color 0.2s, transform 0.2s;
        padding: 0;
        line-height: 1;
      }
      .theme-btn:hover {
        transform: scale(1.15);
        border-color: rgba(255, 255, 255, 0.7);
      }
      .theme-btn.is-active {
        border-color: rgba(255, 255, 255, 0.9);
        transform: scale(1.1);
      }

      /* For mono-light theme, theme btn border uses dark color */
      [data-theme="mono-light"] .theme-btn {
        border-color: rgba(0, 0, 0, 0.2);
      }
      [data-theme="mono-light"] .theme-btn:hover {
        border-color: rgba(0, 0, 0, 0.5);
      }
      [data-theme="mono-light"] .theme-btn.is-active {
        border-color: rgba(0, 0, 0, 0.7);
      }

      /* ── Setup URL Modal ── */
      .setup-url-info {
        font-size: 0.875rem;
        color: var(--text-secondary);
        margin-bottom: 16px;
        line-height: 1.5;
      }
      .setup-url-box {
        display: flex;
        gap: 8px;
      }
      .setup-url-input {
        flex: 1;
        font-family: monospace;
        font-size: 0.875rem;
        background: var(--bg-elevated);
      }
      .setup-url-loading {
        text-align: center;
        padding: 32px;
        color: var(--text-secondary);
      }
      .setup-tokens-list {
        margin-top: 16px;
        border-top: 1px solid var(--border-base);
        padding-top: 12px;
      }
      .setup-tokens-list h4 {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }
      .setup-token-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 0;
        font-size: 0.8rem;
        border-bottom: 1px solid var(--border-subtle);
      }
      .setup-token-item:last-child {
        border-bottom: none;
      }
      .setup-token-url {
        flex: 1;
        font-family: monospace;
        font-size: 0.75rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text-primary);
        background: var(--bg-elevated);
        padding: 4px 8px;
        border-radius: 4px;
      }
      .setup-token-days {
        font-size: 0.75rem;
        color: var(--status-active);
        white-space: nowrap;
        font-weight: 500;
      }

      /* Theme switcher on login screen */
      .theme-switcher-login {
        position: fixed;
        top: 1rem;
        right: 1rem;
        z-index: 100;
        display: flex;
        gap: 4px;
        background: var(--bg-card);
        padding: 4px 8px;
        border-radius: 20px;
        border: 1px solid var(--border-base);
        box-shadow: var(--shadow-card);
      }
      .theme-switcher-login .theme-btn {
        border-color: var(--border-input);
      }
      .theme-switcher-login .theme-btn:hover {
        border-color: var(--accent);
      }
      .theme-switcher-login .theme-btn.is-active {
        border-color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div x-data>
      <!-- Toast Container -->
      <div class="toast-container">
        <template x-for="t in $store.toast.items" :key="t.id">
          <div class="toast-item" x-bind:class="'is-' + t.type" x-text="t.message"></div>
        </template>
      </div>

      <!-- ═══════════════════════════════════════════ -->
      <!-- LOGIN SCREEN -->
      <!-- ═══════════════════════════════════════════ -->
      <template x-if="!$store.auth.authenticated">
        <section class="hero is-fullheight">
          <!-- Theme switcher on login screen -->
          <div class="theme-switcher-login">
            <button class="theme-btn" x-bind:class="{ 'is-active': $store.theme.current === 'blue' }" x-on:click="$store.theme.set('blue')" title="Blue">🎨</button>
            <button class="theme-btn" x-bind:class="{ 'is-active': $store.theme.current === 'mono-dark' }" x-on:click="$store.theme.set('mono-dark')" title="Dark">🌑</button>
            <button class="theme-btn" x-bind:class="{ 'is-active': $store.theme.current === 'mono-light' }" x-on:click="$store.theme.set('mono-light')" title="Light">⚪</button>
          </div>
          <div class="hero-body">
            <div class="container has-text-centered" style="max-width: 400px">
              <div class="box">
                <h1 class="title is-4">ライセンス管理</h1>
                <p class="subtitle is-6 has-text-grey-light">管理トークンを入力してください</p>
                <div x-data="authGate">
                  <div class="field">
                    <div class="control">
                      <input
                        class="input"
                        type="password"
                        placeholder="ADMIN_TOKEN"
                        x-model="token"
                        x-on:keydown.enter="submit"
                        x-bind:disabled="loading"
                        x-on:input="error = ''"
                      />
                    </div>
                  </div>
                  <div x-show="error" class="notification is-danger is-light mb-3" style="font-size: 0.85rem" x-text="error"></div>
                  <button class="button is-primary is-fullwidth" x-bind:class="{ 'is-loading': loading }" x-on:click="submit" x-text="loading ? '認証中...' : 'ログイン'"></button>
                </div>
              </div>
            </div>
          </div>
        </section>
      </template>

      <!-- ═══════════════════════════════════════════ -->
      <!-- MAIN APP -->
      <!-- ═══════════════════════════════════════════ -->
      <template x-if="$store.auth.authenticated">
        <div x-data="licenseAdmin">
          <!-- Sidebar Overlay (mobile) -->
          <div
            class="sidebar-overlay"
            x-bind:class="{ 'is-active': sidebarOpen }"
            x-on:click="closeSidebar"
          ></div>

          <div class="columns is-gapless">
            <!-- Sidebar -->
            <div class="column is-2 sidebar" x-bind:class="{ 'is-open': sidebarOpen, 'is-closed': sidebarClosed }">
              <div class="admin-header mb-4 sidebar-header-desktop">
                <strong>ライセンス管理</strong>
              </div>
              <nav class="menu sidebar-menu" aria-label="管理メニュー">
                <p class="menu-label">メニュー</p>
                <ul class="menu-list">
                  <template x-for="tab in tabs" :key="tab.id">
                    <li>
                      <a
                        x-bind:class="{ 'is-active': activeTab === tab.id }"
                        x-on:click="switchTab(tab.id)"
                        x-text="tab.icon + ' ' + tab.label"
                      ></a>
                    </li>
                  </template>
                </ul>
              </nav>
              <div class="mt-6">
                <button class="button is-small is-light" x-on:click="logout">ログアウト</button>
              </div>
            </div>

            <!-- Main Content -->
            <div class="column">
              <!-- Header Bar -->
              <div class="admin-header is-flex is-justify-content-space-between is-align-items-center">
                <div class="is-flex is-align-items-center">
                  <button
                    class="hamburger-btn button is-small is-ghost mr-2"
                    x-bind:aria-label="sidebarClosed ? 'メニューを開く' : 'メニューを閉じる'"
                    x-on:click="toggleSidebar"
                  >☰</button>
                  <strong class="is-hidden-desktop header-text">ライセンス管理</strong>
                  <span class="header-text-muted" x-text="'/ ' + activeTabLabel"></span>
                </div>
                <div class="theme-switcher">
                  <button class="theme-btn" x-bind:class="{ 'is-active': $store.theme.current === 'blue' }" x-on:click="$store.theme.set('blue')" title="Blue">🎨</button>
                  <button class="theme-btn" x-bind:class="{ 'is-active': $store.theme.current === 'mono-dark' }" x-on:click="$store.theme.set('mono-dark')" title="Dark">🌑</button>
                  <button class="theme-btn" x-bind:class="{ 'is-active': $store.theme.current === 'mono-light' }" x-on:click="$store.theme.set('mono-light')" title="Light">⚪</button>
                </div>
              </div>

              <div class="main-content">
                <!-- ═══════════════════════════════════ -->
                <!-- DASHBOARD TAB -->
                <!-- ═══════════════════════════════════ -->
                <div x-show="activeTab === 'dashboard'" x-data="licenseDashboard">
                  <p class="title is-4 mb-4">ダッシュボード</p>

                  <div x-show="loading" class="has-text-centered py-6">
                    <button class="button is-loading is-large is-static"></button>
                    <p class="mt-3 has-text-grey-light">読み込み中...</p>
                  </div>

                  <div x-show="!loading && error" class="notification is-danger" role="alert">
                    <p x-text="error"></p>
                    <button class="button is-small is-light mt-2" x-on:click="refresh">再試行</button>
                  </div>

                  <div x-show="!loading && !error">
                    <!-- Summary Cards -->
                    <div class="summary-bar">
                      <div class="summary-card">
                        <p class="num has-text-primary" x-text="totalActive + totalExpiring + totalRevoked"></p>
                        <p class="lbl">総契約数</p>
                      </div>
                      <div class="summary-card">
                        <p class="num status-active-color" x-text="totalActive"></p>
                        <p class="lbl">アクティブ</p>
                      </div>
                      <div class="summary-card">
                        <p class="num status-expiring-color" x-text="totalExpiring"></p>
                        <p class="lbl">猶予期間中</p>
                      </div>
                      <div class="summary-card">
                        <p class="num status-revoked-color" x-text="totalRevoked"></p>
                        <p class="lbl">利用停止</p>
                      </div>
                    </div>

                    <!-- Per-App Breakdown Table -->
                    <p class="heading mb-3">アプリ別内訳</p>
                    <div class="content-scroll">
                      <table class="table is-fullwidth is-hoverable" style="min-width: 500px">
                        <thead>
                          <tr>
                            <th>アプリ</th>
                            <th class="has-text-centered">総数</th>
                            <th class="has-text-centered">アクティブ</th>
                            <th class="has-text-centered">猶予期間中</th>
                            <th class="has-text-centered">利用停止</th>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="app in perAppBreakdown" :key="app.appId">
                            <tr>
                              <td x-text="app.icon + ' ' + app.appName"></td>
                              <td class="has-text-centered has-text-weight-semibold" x-text="app.total"></td>
                              <td class="has-text-centered status-active-color" x-text="app.active"></td>
                              <td class="has-text-centered status-expiring-color" x-text="app.expiring"></td>
                              <td class="has-text-centered status-revoked-color" x-text="app.revoked"></td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

                <!-- ═══════════════════════════════════ -->
                <!-- LICENSE LIST TAB -->
                <!-- ═══════════════════════════════════ -->
                <div x-show="activeTab === 'licenses'" x-data="licenseList">
                  <p class="title is-4 mb-4">ライセンス一覧</p>

                  <!-- Filter Bar -->
                  <div class="filter-bar">
                    <div class="field">
                      <div class="control">
                        <div class="select is-small">
                          <select x-model="filterApp">
                            <option value="">全アプリ</option>
                            <template x-for="app in apps" :key="app.appId">
                              <option :value="app.appId" x-text="app.appName"></option>
                            </template>
                          </select>
                        </div>
                      </div>
                    </div>
                    <div class="field">
                      <div class="control">
                        <div class="select is-small">
                          <select x-model="filterStatus">
                            <option value="">全ステータス</option>
                            <option value="active">active</option>
                            <option value="expiring">expiring</option>
                            <option value="revoked">revoked</option>
                          </select>
                        </div>
                      </div>
                    </div>
                    <div class="field">
                      <div class="control">
                        <input class="input is-small" type="text" placeholder="会社名で検索" x-model="filterSearch" />
                      </div>
                    </div>
                    <div class="field">
                      <div class="control">
                        <button class="button is-primary is-small" x-on:click="openAddModal">＋ 新規登録</button>
                      </div>
                    </div>
                  </div>

                  <!-- License Table -->
                  <div class="content-scroll">
                    <table class="table is-fullwidth is-hoverable" style="min-width: 900px">
                      <thead>
                        <tr>
                          <th>アプリ</th>
                          <th>会社名</th>
                          <th>スクリプトID</th>
                          <th>ステータス</th>
                          <th>有効期限</th>
                          <th>備考</th>
                          <th>操作</th>
                        </tr>
                      </thead>
                      <tbody>
                        <template x-for="c in filteredLicenses" :key="c.id">
                          <tr>
                            <td>
                              <span class="app-icon" x-text="getAppIcon(c.appId)"></span>
                              <span x-text="c.appName"></span>
                            </td>
                            <td x-text="c.companyName"></td>
                            <td>
                              <span class="script-id-cell">
                                <span class="script-id-truncated" x-text="c.scriptId.substring(0, 12) + '…'" x-bind:title="c.scriptId"></span>
                                <button class="copy-btn" x-on:click="copyScriptId(c.scriptId)">コピー</button>
                              </span>
                            </td>
                            <td>
                              <span class="tag is-small" x-bind:class="statusTagClass(c.status)" x-text="c.status"></span>
                            </td>
                            <td x-text="c.expiryDate || '—'"></td>
                            <td x-text="c.notes || '—'"></td>
                            <td>
                              <div class="action-btn-group">
                                <button class="button is-small is-info is-light" x-on:click="openViewUrlModal(c)">確認</button>
                                <button class="button is-small is-primary is-light" x-on:click="openSetupUrlModal(c)">発行</button>
                                <button class="button is-small is-info is-light" x-on:click="openEditModal(c)">編集</button>
                                <button class="button is-small is-danger is-light" x-on:click="openDeleteModal(c)">削除</button>
                              </div>
                            </td>
                          </tr>
                        </template>
                        <tr x-show="filteredLicenses.length === 0">
                          <td colspan="7" class="has-text-centered has-text-grey-light py-5">該当するライセンスがありません</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>

                  <!-- ═══════════════════════════════════════════ -->
                  <!-- ADD LICENSE MODAL -->
                  <!-- ═══════════════════════════════════════════ -->
                  <div class="modal" x-bind:class="{ 'is-active': showAddModal }">
                    <div class="modal-background" x-on:click="showAddModal = false"></div>
                    <div class="modal-card">
                      <header class="modal-card-head">
                        <p class="modal-card-title">新規ライセンス登録</p>
                        <button class="delete" aria-label="close" x-on:click="showAddModal = false"></button>
                      </header>
                      <section class="modal-card-body">
                        <div class="field">
                          <label class="label is-small">アプリ選択</label>
                          <div class="control">
                            <div class="select is-fullwidth">
                              <select x-model="addFormAppId">
                                <template x-for="app in apps" :key="app.appId">
                                  <option :value="app.appId" x-text="app.icon + ' ' + app.appName"></option>
                                </template>
                              </select>
                            </div>
                          </div>
                        </div>
                        <div class="field">
                          <label class="label is-small">会社名</label>
                          <div class="control">
                            <input class="input" type="text" placeholder="会社名を入力" x-model="addFormCompanyName" />
                          </div>
                        </div>
                        <div class="field">
                          <label class="label is-small">スクリプトID</label>
                          <div class="control">
                            <input class="input" type="text" placeholder="スクリプトIDを入力" x-model="addFormScriptId" />
                          </div>
                        </div>
                        <div class="field">
                          <label class="label is-small">ステータス</label>
                          <div class="control">
                            <div class="select is-fullwidth">
                              <select x-model="addFormStatus">
                                <option value="active">active</option>
                                <option value="expiring">expiring</option>
                                <option value="revoked">revoked</option>
                              </select>
                            </div>
                          </div>
                        </div>
                        <div class="field" x-show="addFormStatus === 'expiring'">
                          <label class="label is-small">有効期限</label>
                          <div class="control">
                            <input class="input" type="date" x-model="addFormExpiryDate" />
                          </div>
                        </div>
                        <div class="field">
                          <label class="label is-small">備考</label>
                          <div class="control">
                            <textarea class="textarea" placeholder="備考（任意）" x-model="addFormNotes"></textarea>
                          </div>
                        </div>
                        <div class="field">
                          <label class="label is-small">GAS Web App URL</label>
                          <div class="control">
                            <input class="input" type="url" placeholder="https://script.google.com/macros/s/..." x-model="addFormWebAppUrl" />
                          </div>
                        </div>
                        <div class="field">
                          <label class="label is-small">APIキー</label>
                          <div class="control">
                            <input class="input" type="text" placeholder="APIキーを入力" x-model="addFormApiKey" />
                          </div>
                        </div>
                      </section>
                      <footer class="modal-card-foot">
                        <button class="button is-primary" x-on:click="doAdd">登録</button>
                        <button class="button" x-on:click="showAddModal = false">キャンセル</button>
                      </footer>
                    </div>
                  </div>

                  <!-- ═══════════════════════════════════════════ -->
                  <!-- EDIT LICENSE MODAL -->
                  <!-- ═══════════════════════════════════════════ -->
                  <div class="modal" x-bind:class="{ 'is-active': showEditModal }">
                    <div class="modal-background" x-on:click="showEditModal = false"></div>
                    <div class="modal-card">
                      <header class="modal-card-head">
                        <p class="modal-card-title">ライセンス編集</p>
                        <button class="delete" aria-label="close" x-on:click="showEditModal = false"></button>
                      </header>
                      <section class="modal-card-body">
                        <div class="field">
                          <label class="label is-small">会社名</label>
                          <div class="control">
                            <input class="input" type="text" x-model="editCompanyName" />
                          </div>
                        </div>
                        <div class="field">
                          <label class="label is-small">スクリプトID</label>
                          <div class="control">
                            <input class="input" type="text" x-model="editScriptId" />
                          </div>
                        </div>
                        <div class="field">
                          <label class="label is-small">ステータス</label>
                          <div class="control">
                            <div class="select is-fullwidth">
                              <select x-model="editStatus">
                                <option value="active">active</option>
                                <option value="expiring">expiring</option>
                                <option value="revoked">revoked</option>
                              </select>
                            </div>
                          </div>
                        </div>
                        <div class="field" x-show="editStatus === 'expiring'">
                          <label class="label is-small">有効期限（30日後を自動設定）</label>
                          <div class="control">
                            <input class="input" type="date" x-model="editExpiryDate" />
                          </div>
                        </div>
                        <div class="field">
                          <label class="label is-small">備考</label>
                          <div class="control">
                            <textarea class="textarea" x-model="editNotes"></textarea>
                          </div>
                        </div>
                        <div class="field">
                          <label class="label is-small">GAS Web App URL</label>
                          <div class="control">
                            <input class="input" type="url" placeholder="https://script.google.com/macros/s/..." x-model="editWebAppUrl" />
                          </div>
                        </div>
                        <div class="field">
                          <label class="label is-small">APIキー</label>
                          <div class="control">
                            <input class="input" type="text" placeholder="APIキーを入力" x-model="editApiKey" />
                          </div>
                        </div>
                      </section>
                      <footer class="modal-card-foot">
                        <button class="button is-primary" x-on:click="doUpdate">保存</button>
                        <button class="button" x-on:click="showEditModal = false">キャンセル</button>
                      </footer>
                    </div>
                  </div>

                  <!-- ═══════════════════════════════════════════ -->
                  <!-- DELETE CONFIRMATION MODAL -->
                  <!-- ═══════════════════════════════════════════ -->
                  <div class="modal" x-bind:class="{ 'is-active': showDeleteModal }">
                    <div class="modal-background" x-on:click="showDeleteModal = false"></div>
                    <div class="modal-card">
                      <header class="modal-card-head">
                        <p class="modal-card-title">削除確認</p>
                        <button class="delete" aria-label="close" x-on:click="showDeleteModal = false"></button>
                      </header>
                      <section class="modal-card-body">
                        <p class="mb-3">
                          <strong x-text="deleteTarget ? deleteTarget.companyName : ''"></strong>
                        </p>
                        <p class="has-text-grey">このライセンスを削除しますか？</p>
                        <p class="is-size-7 has-text-grey-light mt-2">この操作は取り消せません。</p>
                      </section>
                      <footer class="modal-card-foot">
                        <button class="button is-danger" x-on:click="doDelete">削除</button>
                        <button class="button" x-on:click="showDeleteModal = false">キャンセル</button>
                      </footer>
                    </div>
                  </div>

                  <!-- ═══════════════════════════════════════════ -->
                  <!-- VIEW URL MODAL -->
                  <!-- ═══════════════════════════════════════════ -->
                  <div class="modal" x-bind:class="{ 'is-active': showViewUrlModal }">
                    <div class="modal-background" x-on:click="closeViewUrlModal"></div>
                    <div class="modal-card" style="max-width: 560px">
                      <header class="modal-card-head">
                        <p class="modal-card-title">セットアップURL確認</p>
                        <button class="delete" aria-label="close" x-on:click="closeViewUrlModal"></button>
                      </header>
                      <section class="modal-card-body">
                        <div x-show="viewTokensLoading" class="setup-url-loading">
                          <p>読み込み中...</p>
                        </div>
                        <div x-show="!viewTokensLoading">
                          <template x-if="activeSetupTokens.length > 0">
                            <div class="setup-tokens-list" style="margin-top:0;border-top:none;padding-top:0">
                              <p class="setup-url-info">以下のURLが有効です。</p>
                              <template x-for="t in activeSetupTokens" :key="t.token">
                                <div class="setup-token-item">
                                  <span class="setup-token-url" x-text="t.setupUrl" x-bind:title="t.setupUrl"></span>
                                  <span class="setup-token-days" x-text="t.daysLeft + '日'"></span>
                                  <button class="copy-btn" x-on:click="copyExistingUrl(t.setupUrl)">コピー</button>
                                </div>
                              </template>
                            </div>
                          </template>
                          <template x-if="activeSetupTokens.length === 0">
                            <p class="setup-url-info">発行済みのURLはありません。「発行」ボタンから新規発行してください。</p>
                          </template>
                        </div>
                      </section>
                      <footer class="modal-card-foot">
                        <button class="button" x-on:click="closeViewUrlModal">閉じる</button>
                      </footer>
                    </div>
                  </div>

                  <!-- ═══════════════════════════════════════════ -->
                  <!-- SETUP URL MODAL -->
                  <!-- ═══════════════════════════════════════════ -->
                  <div class="modal" x-bind:class="{ 'is-active': showSetupUrlModal }">
                    <div class="modal-background" x-on:click="closeSetupUrlModal"></div>
                    <div class="modal-card" style="max-width: 560px">
                      <header class="modal-card-head">
                        <p class="modal-card-title">セットアップURL</p>
                        <button class="delete" aria-label="close" x-on:click="closeSetupUrlModal"></button>
                      </header>
                      <section class="modal-card-body">
                        <template x-if="!setupUrl">
                          <div class="setup-url-loading">
                            <p>URLを生成中...</p>
                          </div>
                        </template>
                        <template x-if="setupUrl">
                          <div class="setup-url-result">
                            <p class="setup-url-info">このURLを顧客に送付してください。リンクは7日間有効で、期間内は複数端末から利用可能です。</p>
                            <div class="setup-url-box">
                              <input type="text" x-model="setupUrl" readonly class="input setup-url-input" />
                              <button class="button is-primary" x-on:click="copySetupUrl">コピー</button>
                            </div>
                            <div class="setup-tokens-list" x-show="activeSetupTokens.length > 0">
                              <h4>有効な発行済みURL</h4>
                              <template x-for="t in activeSetupTokens" :key="t.token">
                                <div class="setup-token-item">
                                  <span class="setup-token-url" x-text="t.setupUrl" x-bind:title="t.setupUrl"></span>
                                  <span class="setup-token-days" x-text="t.daysLeft + '日'"></span>
                                  <button class="copy-btn" x-on:click="copyExistingUrl(t.setupUrl)">コピー</button>
                                </div>
                              </template>
                            </div>
                          </div>
                        </template>
                      </section>
                      <footer class="modal-card-foot">
                        <button class="button" x-on:click="closeSetupUrlModal">閉じる</button>
                      </footer>
                    </div>
                  </div>
                </div>

                <!-- ═══════════════════════════════════ -->
                <!-- APP MANAGEMENT TAB -->
                <!-- ═══════════════════════════════════ -->
                <div x-show="activeTab === 'apps'" x-data="appManagement">
                  <div class="is-flex is-justify-content-space-between is-align-items-center mb-4">
                    <p class="title is-4 mb-0">アプリ管理</p>
                    <button class="button is-primary is-small" x-on:click="openAddAppModal">＋ アプリ追加</button>
                  </div>

                  <p class="mb-3 has-text-grey is-size-7">アプリを追加すると、ライセンス一覧のアプリ選択肢に自動的に反映されます。</p>

                  <div class="content-scroll">
                    <table class="table is-fullwidth is-hoverable" style="min-width: 600px">
                      <thead>
                        <tr>
                          <th>アイコン</th>
                          <th>アプリID</th>
                          <th>アプリ名</th>
                          <th class="has-text-centered">ライセンス数</th>
                          <th>操作</th>
                        </tr>
                      </thead>
                      <tbody>
                        <template x-for="app in apps" :key="app.appId">
                          <tr>
                            <td><span class="is-size-4" x-text="app.icon"></span></td>
                            <td><code x-text="app.appId"></code></td>
                            <td x-text="app.appName"></td>
                            <td class="has-text-centered" x-text="getLicenseCount(app.appId)"></td>
                            <td>
                              <div class="action-btn-group">
                                <button class="button is-small is-info is-light" x-on:click="openEditAppModal(app)">編集</button>
                                <button class="button is-small is-danger is-light" x-on:click="openDeleteAppModal(app)">削除</button>
                              </div>
                            </td>
                          </tr>
                        </template>
                        <tr x-show="apps.length === 0">
                          <td colspan="5" class="has-text-centered has-text-grey-light py-5">アプリが登録されていません</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>

                  <!-- ADD APP MODAL -->
                  <div class="modal" x-bind:class="{ 'is-active': showAddAppModal }">
                    <div class="modal-background" x-on:click="showAddAppModal = false"></div>
                    <div class="modal-card">
                      <header class="modal-card-head">
                        <p class="modal-card-title">アプリ追加</p>
                        <button class="delete" aria-label="close" x-on:click="showAddAppModal = false"></button>
                      </header>
                      <section class="modal-card-body">
                        <div class="field">
                          <label class="label is-small">アプリID <span class="has-text-danger">*</span></label>
                          <div class="control">
                            <input class="input" type="text" placeholder="例: suido, gas, denki" x-model="appFormAppId" />
                          </div>
                          <p class="help has-text-grey">半角英数字で入力。後から変更できません。</p>
                        </div>
                        <div class="field">
                          <label class="label is-small">アプリ名 <span class="has-text-danger">*</span></label>
                          <div class="control">
                            <input class="input" type="text" placeholder="例: 水道検針" x-model="appFormAppName" />
                          </div>
                        </div>
                        <div class="field">
                          <label class="label is-small">アイコン</label>
                          <div class="control">
                            <input class="input" type="text" placeholder="例: 💧 🔥 ⚡ 🏠" x-model="appFormIcon" style="max-width: 100px" />
                          </div>
                          <p class="help has-text-grey">絵文字を1つ入力してください。</p>
                        </div>
                      </section>
                      <footer class="modal-card-foot">
                        <button class="button is-primary" x-on:click="doAddApp">追加</button>
                        <button class="button" x-on:click="showAddAppModal = false">キャンセル</button>
                      </footer>
                    </div>
                  </div>

                  <!-- EDIT APP MODAL -->
                  <div class="modal" x-bind:class="{ 'is-active': showEditAppModal }">
                    <div class="modal-background" x-on:click="showEditAppModal = false"></div>
                    <div class="modal-card">
                      <header class="modal-card-head">
                        <p class="modal-card-title">アプリ編集</p>
                        <button class="delete" aria-label="close" x-on:click="showEditAppModal = false"></button>
                      </header>
                      <section class="modal-card-body">
                        <div class="field">
                          <label class="label is-small">アプリID</label>
                          <p class="has-text-weight-semibold" x-text="editAppTarget ? editAppTarget.appId : ''"></p>
                          <p class="help has-text-grey">アプリIDは変更できません。</p>
                        </div>
                        <div class="field">
                          <label class="label is-small">アプリ名 <span class="has-text-danger">*</span></label>
                          <div class="control">
                            <input class="input" type="text" x-model="appFormAppName" />
                          </div>
                        </div>
                        <div class="field">
                          <label class="label is-small">アイコン</label>
                          <div class="control">
                            <input class="input" type="text" x-model="appFormIcon" style="max-width: 100px" />
                          </div>
                        </div>
                      </section>
                      <footer class="modal-card-foot">
                        <button class="button is-primary" x-on:click="doEditApp">保存</button>
                        <button class="button" x-on:click="showEditAppModal = false">キャンセル</button>
                      </footer>
                    </div>
                  </div>

                  <!-- DELETE APP MODAL -->
                  <div class="modal" x-bind:class="{ 'is-active': showDeleteAppModal }">
                    <div class="modal-background" x-on:click="showDeleteAppModal = false"></div>
                    <div class="modal-card">
                      <header class="modal-card-head">
                        <p class="modal-card-title">アプリ削除</p>
                        <button class="delete" aria-label="close" x-on:click="showDeleteAppModal = false"></button>
                      </header>
                      <section class="modal-card-body">
                        <p class="mb-3">
                          <span x-text="deleteAppTarget ? deleteAppTarget.icon : ''"></span>
                          <strong x-text="deleteAppTarget ? deleteAppTarget.appName : ''"></strong>
                        </p>
                        <p class="has-text-grey">このアプリを削除しますか？</p>
                        <p class="is-size-7 has-text-grey-light mt-2">この操作は取り消せません。</p>
                      </section>
                      <footer class="modal-card-foot">
                        <button class="button is-danger" x-on:click="doDeleteApp">削除</button>
                        <button class="button" x-on:click="showDeleteAppModal = false">キャンセル</button>
                      </footer>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </template>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
