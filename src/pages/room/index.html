<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>部屋選択 - 水道メーター読み取りアプリ</title>
  <meta name="theme-color" content="#007bff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <style>
  /* Skeleton screen for first paint */
  .skeleton-header { height:64px;background:linear-gradient(90deg,#1976d2 25%,#1565c0 50%,#1976d2 75%);background-size:200% 100%;animation:shimmer 1.5s infinite; }
  .skeleton-card { height:80px;margin:16px;border-radius:8px;background:linear-gradient(90deg,#e0e0e0 25%,#eeeeee 50%,#e0e0e0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite; }
  .skeleton-card:nth-child(2) { height:60px;margin-top:12px; }
  .skeleton-card:nth-child(3) { height:60px;margin-top:12px; }
  @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }
  </style>
</head>
<body>
  <div id="root">
    <div class="skeleton-header"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
  </div>
  <script type="module" src="./main.jsx"></script>
</body>
</html>
